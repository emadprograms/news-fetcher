name: 🦅 NewsFetcher Hunt (Schedule + Manual)

on:
  schedule:
    - cron: '17 1 * * *'  # 1:17 AM UTC — runs ONCE for the previous trading session
  workflow_dispatch:
    inputs:
      target_date:
        description: 'Optional: Date to scan (YYYY-MM-DD). If left blank, it runs for the PREVIOUS trading session (the most recent completed session). Only enter a date to force a specific past day.'
        required: false
        default: ''

jobs:
  scan:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Code
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: 'pip'

      - name: Install Dependencies
        run: |
          pip install -r requirements.txt

      - name: Setup Chrome for Selenium
        uses: browser-actions/setup-chrome@v1
        with:
          chrome-version: stable

      - name: Run Scan
        env:
          INFISICAL_CLIENT_ID: ${{ secrets.INFISICAL_CLIENT_ID }}
          INFISICAL_CLIENT_SECRET: ${{ secrets.INFISICAL_CLIENT_SECRET }}
          INFISICAL_PROJECT_ID: ${{ secrets.INFISICAL_PROJECT_ID }}
          TARGET_DATE: ${{ github.event.inputs.target_date }}
          GITHUB_EVENT_NAME: ${{ github.event_name }}
          PREVIOUS_SESSION: 'true'
        run: |
          # The main.py is already configured to run with headless=True
          python3 main.py
